<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>わくわくおみくじ</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b6b">
<link rel="icon" href="icon-192.png">
<style>
  * { box-sizing: border-box; }
  body {
    font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
    text-align: center;
    background-color: #fff9e6;
    margin: 0;
    padding: 32px 16px 60px;
    color: #4a4a4a;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* ===== 実績解除トースト ===== */
  #achievement-toast {
    position: fixed;
    top: 14px;
    left: 50%;
    transform: translateX(-50%) translateY(-60px);
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    color: #3a2a00;
    padding: 12px 18px;
    border-radius: 16px;
    font-weight: bold;
    font-size: 0.9rem;
    box-shadow: 0 6px 16px rgba(0,0,0,0.25);
    z-index: 1000;
    opacity: 0;
    transition: transform 0.4s ease, opacity 0.4s ease;
    max-width: 320px;
    text-align: center;
  }
  #achievement-toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* ===== 更新バナー ===== */
  #update-banner {
    display: none;
    position: sticky;
    top: 0;
    z-index: 50;
    background: #2f3542;
    color: #fff;
    padding: 12px 14px;
    border-radius: 14px;
    margin: 0 auto 16px;
    max-width: 350px;
    font-size: 0.9rem;
    box-shadow: 0 4px 0 rgba(0,0,0,0.2);
  }
  #update-banner p { margin: 0 0 10px; font-weight: bold; }
  #update-banner .banner-buttons { display: flex; gap: 8px; }
  #update-banner button {
    flex: 1;
    font-size: 0.85rem;
    padding: 10px;
    border: none;
    border-radius: 30px;
    font-weight: bold;
    cursor: pointer;
  }
  #btn-update-now { background: #ff6b6b; color: #fff; }
  #btn-update-later { background: #57606f; color: #fff; }

  .container {
    background: #ffffff;
    padding: 30px 20px;
    border-radius: 30px;
    border: 6px solid #ff6b6b;
    box-shadow: 0 8px 0px #ee5253;
    max-width: 350px;
    margin: 0 auto;
    position: relative;
  }
  h1 { color: #ff6b6b; font-size: 2rem; margin: 0 0 10px 0; }
  .shrine-emoji { font-size: 3rem; margin-bottom: 6px; }

  /* ===== カードの土台（枠と中身を分離するための位置基準） ===== */
  .card-stage {
    position: relative;
    margin: 24px 0;
  }

  /* 枠（震えるのはこれだけ。中身には触れない） */
  .card-frame {
    position: absolute;
    inset: -4px;
    border: 3px dashed #ff9f43;
    border-radius: 22px;
    pointer-events: none;
    z-index: 12;
  }
  .shake { animation: wakuwaku 0.1s infinite; }
  @keyframes wakuwaku {
    0% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
    100% { transform: rotate(-3deg); }
  }
  .shake-intense { animation: wakuwaku-intense 0.07s infinite; }
  @keyframes wakuwaku-intense {
    0% { transform: rotate(-6deg) scale(1.04); }
    50% { transform: rotate(6deg) scale(1.04); }
    100% { transform: rotate(-6deg) scale(1.04); }
  }
  .shake-fade { animation: wakuwaku-fade 0.6s ease-out; }
  @keyframes wakuwaku-fade {
    0% { transform: rotate(-3deg); }
    60% { transform: rotate(2deg); }
    100% { transform: rotate(0deg); }
  }

  /* 中身（震えない） */
  .result-card {
    background-color: #fef2f2;
    border-radius: 20px;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* 画像は必ずJSのインラインスタイルでbackgroundImage等を設定する（CSSクラス経由にしない） */
  #box-icon {
    width: 70px;
    height: 70px;
  }

  .result {
    font-size: 3.8rem;
    font-weight: bold;
    color: #ee5253;
    text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(0,0,0,0.1);
  }
  .message { font-size: 1rem; font-weight: bold; color: #ff9f43; margin-top: 5px; }

  /* ===== リーチ煽りテロップ ===== */
  .reach-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 10px;
    border-radius: 17px;
    background: rgba(255,255,255,0.92);
    opacity: 0;
    transition: opacity 0.25s ease;
    pointer-events: none;
    z-index: 5;
    font-weight: bold;
  }
  .reach-1 { color: #ff9f43; font-size: 1.15rem; }
  .reach-2 { color: #ff6b6b; font-size: 1.35rem; }
  .reach-3 {
    color: #ee5253;
    font-size: 1.55rem;
    animation: reach-pulse 0.3s infinite;
  }
  .reach-premium {
    background: radial-gradient(circle, rgba(25,20,5,0.94), rgba(45,32,0,0.94));
    color: #ffd700;
    font-size: 1.4rem;
    animation: premium-glow 0.4s infinite alternate;
  }
  @keyframes reach-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  @keyframes premium-glow {
    from { text-shadow: 0 0 6px #ffd700; }
    to { text-shadow: 0 0 18px #fff2a8; }
  }

  /* ===== キュイン演出 ===== */
  .kyuin-burst {
    position: absolute;
    inset: 0;
    z-index: 7;
    background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0) 60%);
    opacity: 0;
    animation: kyuin-flash 0.45s ease-out;
    pointer-events: none;
  }
  @keyframes kyuin-flash {
    0% { opacity: 0; transform: scale(0.2); }
    30% { opacity: 1; transform: scale(1.3); }
    100% { opacity: 0; transform: scale(1.7); }
  }

  /* ===== 狐演出（左下。リールと被らないように） ===== */
  .fox-pop {
    position: absolute;
    font-size: 2.2rem;
    bottom: 6px;
    left: 10px;
    z-index: 6;
    animation: fox-bounce 1.1s ease-in-out;
    pointer-events: none;
  }
  @keyframes fox-bounce {
    0% { transform: translateY(40px) scale(0.6); opacity: 0; }
    30% { transform: translateY(-6px) scale(1.1); opacity: 1; }
    50% { transform: translateY(0) scale(1); }
    80% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(10px) scale(0.9); opacity: 0; }
  }

  /* ===== ミニスロットリール（右下） ===== */
  .reel-widget {
    position: absolute;
    bottom: 6px;
    right: 6px;
    display: none;
    gap: 3px;
    z-index: 6;
  }
  .reel-box {
    width: 30px;
    height: 22px;
    background: #2f3542;
    color: #ffd700;
    font-size: 0.5rem;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    border: 1px solid #ffd700;
    line-height: 1;
    overflow: hidden;
    white-space: nowrap;
  }

  /* ===== ふすま演出（大吉確定の大型リアクション） ===== */
  .fusuma-overlay {
    position: absolute;
    inset: 0;
    z-index: 9;
    display: none;
    pointer-events: none;
    overflow: hidden;
    border-radius: 20px;
  }
  .fusuma-panel {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 50%;
    background: repeating-linear-gradient(90deg, #f5ecd7 0px, #f5ecd7 38px, #d8c9a3 40px);
    box-shadow: inset 0 0 12px rgba(0,0,0,0.18);
    transition: transform 0.6s cubic-bezier(0.7,0,0.3,1);
  }
  .fusuma-left { left: 0; transform: translateX(-100%); border-right: 3px solid #5c3b1e; }
  .fusuma-right { right: 0; transform: translateX(100%); border-left: 3px solid #5c3b1e; }
  .fusuma-left.closed { transform: translateX(0); }
  .fusuma-right.closed { transform: translateX(0); }
  .fusuma-overlay.fusuma-gold .fusuma-panel {
    background: repeating-linear-gradient(90deg, #fff3c4 0px, #fff3c4 38px, #ffd700 40px);
  }
  .fusuma-overlay.fusuma-gold .fusuma-left { border-right-color: #b8860b; }
  .fusuma-overlay.fusuma-gold .fusuma-right { border-left-color: #b8860b; }
  .fusuma-flower {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 1.3rem;
    z-index: 1;
    pointer-events: none;
  }

  .button-group { display: flex; flex-direction: column; gap: 10px; }
  button { font-size: 1.2rem; padding: 15px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.1s; }
  .btn-start { background-color: #ff6b6b; color: white; box-shadow: 0 5px 0px #ee5253; }
  .btn-reset { background-color: #ffcc5c; color: #4a4a4a; font-size: 0.9rem; }
  button:active { transform: translateY(3px); box-shadow: none; }
  button:disabled { opacity: 0.6; cursor: default; transform: none; }

  /* ===== 神託ボックス ===== */
  .oracle-box {
    margin-top: 14px;
    padding: 12px;
    border: 2px dashed #9e2a2b;
    border-radius: 14px;
    background: #fff7ec;
    color: #6b3a1f;
    font-size: 0.82rem;
    line-height: 1.5;
    display: none;
    text-align: left;
  }
  .oracle-label {
    font-weight: bold;
    color: #9e2a2b;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }

  /* ===== 連チャン記録パネル ===== */
  .stats-panel {
    margin-top: 16px;
    background: #fff7e0;
    border: 2px solid #ffcc5c;
    border-radius: 16px;
    padding: 10px 14px;
    font-size: 0.8rem;
    color: #946200;
    text-align: left;
  }
  .stats-row { display: flex; justify-content: space-between; padding: 3px 0; }
  .stats-row strong { font-size: 1rem; color: #ee5253; }

  /* ===== 大当たりエフェクト ===== */
  #flash-overlay {
    position: fixed;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    transition: opacity 0.4s ease;
  }
  #confetti-layer {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 998;
  }
  .confetti-piece {
    position: absolute;
    top: -20px;
    width: 8px;
    height: 14px;
    opacity: 0.95;
    animation-name: confetti-fall;
    animation-timing-function: linear;
    animation-fill-mode: forwards;
  }
  @keyframes confetti-fall {
    to { transform: translateY(110vh) rotate(480deg); opacity: 0.85; }
  }

  /* ===== ミッション / 実績パネル ===== */
  .feature-wrap { max-width: 350px; margin: 14px auto 0; }
  .feature-toggle {
    width: 100%;
    background: #fff2cc;
    color: #946200;
    border: 2px solid #ffcc5c;
    border-radius: 14px;
    font-size: 0.88rem;
    padding: 12px;
    font-weight: bold;
    box-shadow: none;
  }
  .feature-panel {
    display: none;
    margin-top: 8px;
    background: #fffaf0;
    border: 2px solid #ffcc5c;
    border-radius: 14px;
    padding: 12px 14px;
    text-align: left;
    font-size: 0.82rem;
  }
  .mission-item, .ach-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 7px 0;
    border-bottom: 1px dashed #ffe0a3;
  }
  .mission-item:last-child, .ach-item:last-child { border-bottom: none; }
  .mission-check { font-size: 1.05rem; min-width: 1.2em; }
  .mission-progress { color: #946200; font-size: 0.75rem; }
  .ach-item.locked { opacity: 0.42; }
  .ach-icon { font-size: 1.35rem; }
  .ach-name { font-weight: bold; color: #ee5253; display: block; }
  .ach-desc { font-size: 0.74rem; color: #946200; }

  /* ===== 診断パネル（開発者向け） ===== */
  .diag-wrap { max-width: 350px; margin: 14px auto 0; }
  #diag-toggle {
    width: 100%;
    background: #f1f2f6;
    color: #57606f;
    border: 1px solid #ced6e0;
    border-radius: 12px;
    font-size: 0.85rem;
    padding: 10px;
    box-shadow: none;
  }
  #diag-panel {
    display: none;
    text-align: left;
    background: #2f3542;
    color: #d2dae2;
    border-radius: 12px;
    padding: 14px;
    margin-top: 10px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 0.72rem;
    line-height: 1.5;
    word-break: break-all;
  }
  #diag-panel h2 { font-size: 0.8rem; color: #fff; margin: 14px 0 4px; border-bottom: 1px solid #57606f; padding-bottom: 4px; }
  #diag-panel h2:first-of-type { margin-top: 0; }
  #diag-panel .ok { color: #7bed9f; }
  #diag-panel .ng { color: #ff6b81; }
  #diag-panel ul { margin: 4px 0; padding-left: 16px; }
  #diag-refresh-btn {
    width: 100%;
    margin-top: 12px;
    background: #ffa502;
    color: #2f3542;
    border-radius: 10px;
    font-size: 0.8rem;
    padding: 10px;
    box-shadow: none;
  }
  #diag-update-btn {
    width: 100%;
    margin-top: 8px;
    background: #57606f;
    color: #fff;
    border-radius: 10px;
    font-size: 0.8rem;
    padding: 10px;
    box-shadow: none;
  }
</style>
</head>
<body>

<div id="flash-overlay"></div>
<div id="confetti-layer"></div>
<div id="achievement-toast"></div>

<div id="update-banner">
  <p>🆕 新しいバージョンが見つかりました</p>
  <div class="banner-buttons">
    <button id="btn-update-now">更新する</button>
    <button id="btn-update-later">あとで</button>
  </div>
</div>

<div class="container">
  <div class="shrine-emoji">⛩️</div>
  <h1>おみくじ</h1>

  <div class="card-stage">
    <div class="card-frame" id="card-frame"></div>
    <div class="result-card" id="card">
      <div id="box-icon"></div>
      <div id="result" class="result"></div>
      <div id="msg" class="message"></div>
      <div id="reach-text" class="reach-text"></div>

      <div class="reel-widget" id="reel-widget">
        <div class="reel-box" id="reel1">大吉</div>
        <div class="reel-box" id="reel2">大吉</div>
        <div class="reel-box" id="reel3">大吉</div>
      </div>

      <div class="fusuma-overlay" id="fusuma-overlay">
        <div class="fusuma-panel fusuma-left" id="fusuma-left"></div>
        <div class="fusuma-panel fusuma-right" id="fusuma-right"></div>
        <div class="fusuma-flower">🌸</div>
      </div>
    </div>
  </div>

  <div class="oracle-box" id="oracle-box">
    <div class="oracle-label">神託</div>
    <div id="oracle-text"></div>
  </div>

  <div class="button-group">
    <button class="btn-start" id="start-btn">おみくじを引く！</button>
    <button class="btn-reset" id="reset-btn">もういちど</button>
  </div>

  <div class="stats-panel" id="stats-panel">
    <div class="stats-row"><span>本日の挑戦</span><span><strong id="stat-today-count">0</strong> 回</span></div>
    <div class="stats-row"><span>本日の大吉</span><span><strong id="stat-today-daikichi">0</strong> 回</span></div>
    <div class="stats-row"><span>🔥 連続当たり中</span><span><strong id="stat-streak">0</strong> 回（自己ベスト <span id="stat-best-streak">0</span>）</span></div>
  </div>
</div>

<div class="feature-wrap">
  <button class="feature-toggle" id="mission-toggle">🎯 本日のデイリーミッション</button>
  <div class="feature-panel" id="mission-panel"></div>
</div>

<div class="feature-wrap">
  <button class="feature-toggle" id="ach-toggle">🏆 実績</button>
  <div class="feature-panel" id="ach-panel"></div>
</div>

<div class="diag-wrap">
  <button id="diag-toggle">⚙️ 診断パネルを表示 / 非表示</button>
  <div id="diag-panel">
    <h2>Service Worker</h2>
    <div id="diag-sw">確認中...</div>

    <h2>ストレージ永続化</h2>
    <div id="diag-storage">確認中...</div>

    <h2>キャッシュ件数</h2>
    <div id="diag-count">確認中...</div>

    <h2>キャッシュ済みURL一覧</h2>
    <ul id="diag-urls"><li>確認中...</li></ul>

    <h2>直近のキャッシュ取得結果</h2>
    <div id="diag-report">確認中...</div>

    <button id="diag-update-btn">🔄 最新版を確認</button>
    <button id="diag-refresh-btn">📥 キャッシュを今すぐ手動で再取得する</button>
  </div>
</div>

<script>
/* =========================================================
   神社背景（SVGを自作し、JSのインラインスタイルで設定する）
   ========================================================= */
function applyShrineBackground() {
  const svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMax slice">' +
    '<defs><linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">' +
    '<stop offset="0%" stop-color="#ffd89b"/>' +
    '<stop offset="45%" stop-color="#ff9a76"/>' +
    '<stop offset="100%" stop-color="#c06c84"/>' +
    '</linearGradient></defs>' +
    '<rect width="800" height="600" fill="url(#sky)"/>' +
    '<circle cx="650" cy="140" r="70" fill="#fff3c4" opacity="0.85"/>' +
    '<path d="M0,420 L120,360 L260,400 L420,330 L560,390 L700,340 L800,400 L800,600 L0,600 Z" fill="#5b4b6b" opacity="0.55"/>' +
    '<path d="M0,470 L150,420 L320,460 L480,400 L650,450 L800,420 L800,600 L0,600 Z" fill="#3b2f4a" opacity="0.78"/>' +
    '<g fill="#1e2a1e" opacity="0.85">' +
    '<path d="M90,540 L120,470 L150,540 Z"/>' +
    '<path d="M75,560 L120,460 L165,560 Z"/>' +
    '<path d="M630,550 L665,475 L700,550 Z"/>' +
    '<path d="M610,565 L665,465 L720,565 Z"/>' +
    '</g>' +
    '<g fill="#9e2a2b">' +
    '<rect x="330" y="380" width="22" height="160"/>' +
    '<rect x="448" y="380" width="22" height="160"/>' +
    '<rect x="300" y="358" width="200" height="20"/>' +
    '<rect x="288" y="384" width="224" height="14"/>' +
    '</g>' +
    '</svg>';
  const dataUrl = 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
  document.body.style.backgroundImage = 'url("' + dataUrl + '")';
  document.body.style.backgroundSize = 'cover';
  document.body.style.backgroundPosition = 'center bottom';
  document.body.style.backgroundRepeat = 'no-repeat';
}
applyShrineBackground();

/* =========================================================
   サウンド・バイブレーション・視覚エフェクト系ユーティリティ
   ========================================================= */
let audioCtx = null;
function getAudioCtx() {
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return null;
  if (!audioCtx) audioCtx = new AC();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function beep(freq, startTime, duration, type, gainPeak) {
  const ctx = getAudioCtx();
  if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type || 'square';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(gainPeak || 0.15, startTime + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(startTime);
  osc.stop(startTime + duration);
}

function playDrumRoll(totalMs, tickCount) {
  const ctx = getAudioCtx();
  if (!ctx) return;
  const now = ctx.currentTime;
  for (let i = 0; i < tickCount; i++) {
    const t = now + (totalMs / 1000) * (i / tickCount);
    beep(180 + i * 4, t, 0.05, 'square', 0.1);
  }
}
function playFanfare() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  const now = ctx.currentTime;
  const notes = [523.25, 659.25, 784.0, 1046.5];
  notes.forEach((f, i) => beep(f, now + i * 0.15, 0.35, 'triangle', 0.2));
}
function playPremiumFanfare() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  const now = ctx.currentTime;
  const notes = [392.0, 523.25, 659.25, 784.0, 987.77, 1318.5];
  notes.forEach((f, i) => beep(f, now + i * 0.13, 0.4, 'triangle', 0.22));
}
function playChime() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  beep(880, ctx.currentTime, 0.18, 'sine', 0.15);
}
function playLetdown() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  const now = ctx.currentTime;
  beep(330, now, 0.3, 'sine', 0.12);
  beep(220, now + 0.25, 0.4, 'sine', 0.12);
}
function playKyuin() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  const now = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(300, now);
  osc.frequency.exponentialRampToValueAtTime(1800, now + 0.25);
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.linearRampToValueAtTime(0.18, now + 0.05);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(now);
  osc.stop(now + 0.32);
}
function playFusumaSound(kind) {
  const ctx = getAudioCtx();
  if (!ctx) return;
  const bufferSize = Math.floor(ctx.sampleRate * 0.3);
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
  }
  const noise = ctx.createBufferSource();
  noise.buffer = buffer;
  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = kind === 'open' ? 1200 : 600;
  const gain = ctx.createGain();
  gain.gain.value = 0.15;
  noise.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);
  noise.start();
}

function vibrate(pattern) {
  if (navigator.vibrate) {
    try { navigator.vibrate(pattern); } catch (e) { /* 無視 */ }
  }
}

function spawnConfetti(count, goldOnly) {
  const container = document.getElementById('confetti-layer');
  const colors = goldOnly
    ? ['#ffd700', '#ffb300', '#fff2a8', '#ff8c00']
    : ['#ff6b6b', '#ffa502', '#feca57', '#1dd1a1', '#54a0ff', '#5f27cd'];
  for (let i = 0; i < count; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = (Math.random() * 0.3) + 's';
    piece.style.animationDuration = (1.2 + Math.random() * 0.8) + 's';
    piece.style.transform = 'rotate(' + Math.floor(Math.random() * 360) + 'deg)';
    container.appendChild(piece);
    setTimeout(() => piece.remove(), 2600);
  }
}

/* =========================================================
   ふすま演出（大吉確定の大型リアクション）
   ========================================================= */
function closeFusuma(gold) {
  return new Promise((resolve) => {
    const overlay = document.getElementById('fusuma-overlay');
    overlay.classList.toggle('fusuma-gold', !!gold);
    overlay.style.display = 'block';
    playFusumaSound('close');
    // 一旦表示してから閉じるアニメーションを発火させる
    requestAnimationFrame(() => {
      document.getElementById('fusuma-left').classList.add('closed');
      document.getElementById('fusuma-right').classList.add('closed');
    });
    setTimeout(resolve, 650);
  });
}
function openFusuma() {
  return new Promise((resolve) => {
    playFusumaSound('open');
    document.getElementById('fusuma-left').classList.remove('closed');
    document.getElementById('fusuma-right').classList.remove('closed');
    setTimeout(() => {
      document.getElementById('fusuma-overlay').style.display = 'none';
      resolve();
    }, 650);
  });
}

/* =========================================================
   おみくじ本体のロジック
   ========================================================= */
const fortunePool = [
  { result: '大吉', weight: 10, msg: '最高の一日になりそう！' },
  { result: '吉',   weight: 35, msg: 'いいことあるかも！' },
  { result: '中吉', weight: 25, msg: 'なかなかの運勢だよ！' },
  { result: '小吉', weight: 15, msg: 'ハッピーが見つかるよ！' },
  { result: '末吉', weight: 10, msg: 'のんびりいこう！' },
  { result: '凶',   weight: 5,  msg: '忘れ物に気をつけてね！' }
];

function getFortune() {
  const totalWeight = fortunePool.reduce((sum, item) => sum + item.weight, 0);
  let randomNum = Math.floor(Math.random() * totalWeight);
  for (const item of fortunePool) {
    if (randomNum < item.weight) return item;
    randomNum -= item.weight;
  }
}

function getTier(rank) {
  if (rank === '大吉') return 'jackpot';
  if (rank === '凶') return 'low';
  if (rank === '吉' || rank === '中吉') return 'high';
  return 'mid';
}

    el.style.display = 'block';
  } else {
    el.style.backgroundImage = 'none';
    el.style.backgroundSize = 'contain';
    el.style.backgroundPosition = 'center';
    el.style.display = 'none';
  }
}

/* ----- ティアごとの「煽り」シーケンス（枠＝card-frameだけを揺らす） ----- */
async function runLowTier() {
  playDrumRoll(500, 6);
  vibrate(40);
  showReachText('お、当たったかも…！？', 'reach-1');
  await sleep(550);

  const resultDiv = document.getElementById('result');
  resultDiv.textContent = '中吉';
  hideReachText();
  await sleep(450);

  showReachText('…あれ？', 'reach-1');
  const frame = document.getElementById('card-frame');
  frame.classList.remove('shake');
  frame.classList.add('shake-fade');
  playLetdown();
  vibrate([30, 60, 30]);
  await sleep(650);
  hideReachText();

  return { fox: false, premium: false, fusuma: false };
}

async function runMidTier() {
  const fox = Math.random() < 0.3;
  playDrumRoll(650, 8);
  vibrate(30);
  showReachText('ドキドキ…', 'reach-1');
  if (fox) spawnFox();
  await sleep(850);
  hideReachText();
  return { fox: fox, premium: false, fusuma: false };
}

async function runHighTier() {
  const frame = document.getElementById('card-frame');
  const fox = Math.random() < 0.6;
  const kyuin = Math.random() < 0.5;

  playDrumRoll(500, 6);
  showReachText('もしかして…！？', 'reach-1');
  vibrate(40);
  if (fox) spawnFox();
  await sleep(600);

  frame.classList.remove('shake');
  frame.classList.add('shake-intense');
  showReachText('期待していい…？', 'reach-2');
  playDrumRoll(600, 10);
  vibrate(60);
  if (kyuin) kyuinEffect();
  await sleep(700);

  hideReachText();
  return { fox: fox, kyuin: kyuin, premium: false, fusuma: false };
}

async function runJackpotTier() {
  const frame = document.getElementById('card-frame');
  const resultDiv = document.getElementById('result');
  const isPremium = Math.random() < 0.25;

  showReachText('もしかして…！？', 'reach-1');
  playDrumRoll(500, 6);
  vibrate(40);
  spawnFox();
  await sleep(600);

  frame.classList.remove('shake');
  frame.classList.add('shake-intense');
  showReachText('激熱リーチ！？', 'reach-2');
  playDrumRoll(600, 10);
  vibrate(80);
  await sleep(700);

  showReachText('超激熱！！！', 'reach-3');
  playDrumRoll(700, 14);
  vibrate([60, 40, 60, 40, 100]);
  kyuinEffect();
  await sleep(700);

  if (isPremium) {
    showReachText('✨ プレミア演出 ✨', 'reach-premium');
    kyuinEffect();
    playPremiumFanfare();
    vibrate([0, 60, 40, 60, 40, 150]);
    await sleep(900);
  }

  const fakeOptions = ['吉', '中吉', '小吉'];
  resultDiv.textContent = fakeOptions[Math.floor(Math.random() * fakeOptions.length)];
  hideReachText();
  await sleep(400);

  showReachText('そして…', isPremium ? 'reach-premium' : 'reach-3');
  await sleep(500);
  hideReachText();

  // ふすまが閉まり、結果はこの裏で確定する（まだ見えない）
  await closeFusuma(isPremium);

  return { fox: true, kyuin: true, premium: isPremium, fusuma: true };
}

/* ----- 最終結果が表示された直後の「お祝い」エフェクト ----- */
function celebrate(tier, isPremium) {
  if (tier === 'jackpot') {
    if (isPremium) {
      flashScreen(1100, true);
      spawnConfetti(60, true);
      spawnConfetti(50, false);
      playPremiumFanfare();
      vibrate([0, 100, 60, 100, 60, 100, 60, 280]);
    } else {
      flashScreen(900, true);
      spawnConfetti(70, false);
      playFanfare();
      vibrate([0, 80, 60, 80, 60, 220]);
    }
  } else if (tier === 'high') {
    flashScreen(450, false);
    spawnConfetti(18, false);
    playChime();
    vibrate(50);
  } else if (tier === 'mid') {
    playChime();
    vibrate(20);
  }
}

let isDrawing = false;
async function startOmikuji() {
  if (isDrawing) return;
  isDrawing = true;

  const resultDiv = document.getElementById('result');
  const msgDiv = document.getElementById('msg');
  const startBtn = document.getElementById('start-btn');
  const resetBtn = document.getElementById('reset-btn');
  const frame = document.getElementById('card-frame');

  startBtn.disabled = true;
  resetBtn.disabled = true;
  setBoxIconVisible(false);
  msgDiv.textContent = '';
  hideReachText();
  hideOracle();
  resultDiv.textContent = '📦';
  frame.classList.remove('shake-intense', 'shake-fade');
  frame.classList.add('shake');
  startReels();

  const data = getFortune();
  const tier = getTier(data.result);

  let fx = { fox: false, premium: false, fusuma: false };
  if (tier === 'low') {
    fx = await runLowTier();
  } else if (tier === 'mid') {
    fx = await runMidTier();
  } else if (tier === 'high') {
    fx = await runHighTier();
  } else {
    fx = await runJackpotTier();
  }

  hideReels();
  frame.classList.remove('shake', 'shake-intense', 'shake-fade');

  // ふすまが閉まっている間（見えない状態）に最終結果をセットしておく
  resultDiv.textContent = data.result;
  msgDiv.textContent = data.msg;
  hideReachText();
  showOracle(tier);

  if (fx.fusuma) {
    await openFusuma();
  }

  celebrate(tier, fx.premium);
  afterDrawBookkeeping(data.result, fx);

  startBtn.disabled = false;
  resetBtn.disabled = false;
  isDrawing = false;
}

function resetOmikuji() {
  document.getElementById('result').textContent = '';
  document.getElementById('msg').textContent = '';
  document.getElementById('card-frame').classList.remove('shake', 'shake-intense', 'shake-fade');
  hideReachText();
  hideOracle();
  hideReels();
  document.getElementById('fusuma-overlay').style.display = 'none';
  document.getElementById('fusuma-left').classList.remove('closed');
  document.getElementById('fusuma-right').classList.remove('closed');
  setBoxIconVisible(true);
}

document.getElementById('start-btn').addEventListener('click', () => {
  startOmikuji().catch((err) => {
    console.error(err);
    isDrawing = false;
    hideReels();
    document.getElementById('start-btn').disabled = false;
    document.getElementById('reset-btn').disabled = false;
  });
});
document.getElementById('reset-btn').addEventListener('click', resetOmikuji);
setBoxIconVisible(true);

/* =========================================================
   記録（localStorageに保存）：連チャン記録・デイリーミッション・実績
   ========================================================= */
const STATS_KEY = 'omikuji_stats_v2';
const ACH_KEY = 'omikuji_achievements_v1';

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
}

function loadStats() {
  let stats = {};
  try {
    stats = JSON.parse(localStorage.getItem(STATS_KEY)) || {};
  } catch (e) {
    stats = {};
  }
  if (stats.date !== todayStr()) {
    stats.date = todayStr();
    stats.todayCount = 0;
    stats.todayDaikichi = 0;
    stats.todayStreakHit2 = false;
  }
  stats.todayCount = stats.todayCount || 0;
  stats.todayDaikichi = stats.todayDaikichi || 0;
  stats.todayStreakHit2 = stats.todayStreakHit2 || false;
  stats.currentStreak = stats.currentStreak || 0;
  stats.bestStreak = stats.bestStreak || 0;
  stats.totalCount = stats.totalCount || 0;
  stats.totalDaikichi = stats.totalDaikichi || 0;
  stats.totalKyou = stats.totalKyou || 0;
  stats.totalPremium = stats.totalPremium || 0;
  stats.totalFoxSeen = stats.totalFoxSeen || 0;
  return stats;
}

function saveStats(stats) {
  try {
    localStorage.setItem(STATS_KEY, JSON.stringify(stats));
  } catch (e) {
    // 保存に失敗しても画面表示は継続する
  }
}

function loadAchievements() {
  try {
    const data = JSON.parse(localStorage.getItem(ACH_KEY));
    return (data && data.unlocked) ? data.unlocked : {};
  } catch (e) {
    return {};
  }
}
function saveAchievements(unlocked) {
  try {
    localStorage.setItem(ACH_KEY, JSON.stringify({ unlocked: unlocked }));
  } catch (e) {
    // 無視
  }
}

const ACHIEVEMENT_DEFS = [
  { id: 'first_daikichi', icon: '🎉', name: '初めての大吉',     desc: '大吉を1回引く',           check: (s) => s.totalDaikichi >= 1 },

  { id: 'streak_10',      icon: '🌪️', name: '伝説の連勝',       desc: '10回連続で当たりを出す',   check: (s) => s.bestStreak >= 10 },

const MISSION_DEFS = [
  { id: 'm1', label: '本日3回挑戦する',     target: 3, progress: (s) => s.todayCount },
  { id: 'm2', label: '大吉を1回引く',       target: 1, progress: (s) => s.todayDaikichi },
  { id: 'm3', label: '連続2回当たりを出す', target: 1, progress: (s) => (s.todayStreakHit2 ? 1 : 0) }
];

function afterDrawBookkeeping(rank, fx) {
  const stats = loadStats();
  stats.todayCount += 1;
  stats.totalCount += 1;
  if (rank === '大吉') {
    stats.todayDaikichi += 1;
    stats.totalDaikichi += 1;
  }
  if (rank === '凶') {
    stats.totalKyou += 1;
    stats.currentStreak = 0;
  } else {
    stats.currentStreak += 1;
    if (stats.currentStreak >= 2) stats.todayStreakHit2 = true;
    if (stats.currentStreak > stats.bestStreak) stats.bestStreak = stats.currentStreak;
  }
  if (fx && fx.premium) stats.totalPremium += 1;
  if (fx && fx.fox) stats.totalFoxSeen += 1;

  saveStats(stats);
  renderStatsPanel(stats);
  renderMissions(stats);
  checkAchievements(stats);
}

function renderStatsPanel(stats) {
  const s = stats || loadStats();
  document.getElementById('stat-today-count').textContent = s.todayCount;
  document.getElementById('stat-today-daikichi').textContent = s.todayDaikichi;
  document.getElementById('stat-streak').textContent = s.currentStreak;
  document.getElementById('stat-best-streak').textContent = s.bestStreak;
}

function renderMissions(stats) {
  const s = stats || loadStats();
  const panel = document.getElementById('mission-panel');
  panel.innerHTML = '';
  MISSION_DEFS.forEach((def) => {
    const progress = Math.min(def.progress(s), def.target);
    const done = progress >= def.target;
    const row = document.createElement('div');
    row.className = 'mission-item';
    row.innerHTML =
      '<span class="mission-check">' + (done ? '✅' : '⬜') + '</span>' +
      '<span>' + def.label + '<br><span class="mission-progress">' + progress + ' / ' + def.target + '</span></span>';
    panel.appendChild(row);
  });
}

function renderAchievements(unlockedMap) {
  const unlocked = unlockedMap || loadAchievements();
  const panel = document.getElementById('ach-panel');
  panel.innerHTML = '';
  ACHIEVEMENT_DEFS.forEach((def) => {
    const isUnlocked = !!unlocked[def.id];
    const row = document.createElement('div');
    row.className = 'ach-item' + (isUnlocked ? '' : ' locked');
    row.innerHTML =
      '<span class="ach-icon">' + def.icon + '</span>' +
      '<span><span class="ach-name">' + def.name + '</span>' +
      '<span class="ach-desc">' + def.desc + (isUnlocked ? '（達成済み）' : '') + '</span></span>';
    panel.appendChild(row);
  });
}

function showAchievementToast(name) {
  const el = document.getElementById('achievement-toast');
  el.textContent = '🏆 実績解除：' + name;
  el.classList.add('show');
  setTimeout(() => { el.classList.remove('show'); }, 3000);
}

function checkAchievements(stats) {
  const unlocked = loadAchievements();
  let changed = false;
  ACHIEVEMENT_DEFS.forEach((def) => {
    if (!unlocked[def.id] && def.check(stats)) {
      unlocked[def.id] = Date.now();
      changed = true;
      showAchievementToast(def.name);
    }
  });
  if (changed) saveAchievements(unlocked);
  renderAchievements(unlocked);
}

/* =========================================================
   PWA: 完全オフライン優先 + 手動更新方式
   ========================================================= */
let swRegistration = null;

function getMessageTarget() {
  return navigator.serviceWorker.controller || (swRegistration && swRegistration.active);
}

function showUpdateBanner() {
  document.getElementById('update-banner').style.display = 'block';
}
function hideUpdateBanner() {
  document.getElementById('update-banner').style.display = 'none';
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' })
    .then((reg) => {
      swRegistration = reg;

      if (reg.waiting) {
        showUpdateBanner();
      }

      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        if (!newWorker) return;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateBanner();
          }
          refreshDiagnostics();
        });
      });

      refreshDiagnostics();
    })
    .catch((err) => {
      console.error('SW登録失敗', err);
      refreshDiagnostics();
    });

  let didReload = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (didReload) return;
    didReload = true;
    window.location.reload();
  });

  document.getElementById('btn-update-now').addEventListener('click', () => {
    if (swRegistration && swRegistration.waiting) {
      swRegistration.waiting.postMessage({ type: 'SKIP_WAITING' });
    }
  });
  document.getElementById('btn-update-later').addEventListener('click', () => {
    hideUpdateBanner();
  });

  navigator.serviceWorker.addEventListener('message', (event) => {
    const data = event.data || {};
    if (data.type === 'STATUS') {
      renderStatus(data);
    }
    if (data.type === 'CACHE_REPORT') {
      cacheNowResponded = true;
      renderReport(data.report);
      renderStorageAndSw();
    }
  });
}

document.getElementById('diag-update-btn').addEventListener('click', () => {
  if (swRegistration) {
    swRegistration.update().then(() => {
      if (swRegistration.waiting) showUpdateBanner();
    }).catch((e) => {
      alert('更新確認に失敗しました（オフラインの可能性があります）: ' + e);
    });
  } else {
    alert('Service Workerが未登録です。');
  }
});

let storagePersistedResult = null;
if (navigator.storage && navigator.storage.persist) {
  navigator.storage.persist().then((granted) => {
    storagePersistedResult = granted;
    renderStorageAndSw();
  }).catch(() => {
    storagePersistedResult = false;
    renderStorageAndSw();
  });
}

document.getElementById('diag-toggle').addEventListener('click', () => {
  const panel = document.getElementById('diag-panel');
  const isOpen = panel.style.display === 'block';
  panel.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) refreshDiagnostics();
});

function renderStorageAndSw() {
  const swEl = document.getElementById('diag-sw');
  const lines = [];
  if (swRegistration) {
    lines.push('登録: <span class="ok">成功</span>　scope: ' + swRegistration.scope);
    lines.push('installing: ' + (swRegistration.installing ? 'あり' : 'なし'));
    lines.push('waiting: ' + (swRegistration.waiting ? '<span class="ng">あり（更新待ち）</span>' : 'なし'));
    lines.push('active: ' + (swRegistration.active ? 'あり' : 'なし'));
  } else if ('serviceWorker' in navigator) {
    lines.push('<span class="ng">登録処理中または失敗</span>');
  } else {
    lines.push('<span class="ng">このブラウザはService Workerに未対応</span>');
  }
  lines.push('controller有無: ' + (navigator.serviceWorker.controller ? '<span class="ok">あり</span>' : '<span class="ng">なし</span>'));
  swEl.innerHTML = lines.join('<br>');

  const storageEl = document.getElementById('diag-storage');
  if (storagePersistedResult === null) {
    storageEl.textContent = '確認中...';
  } else {
    storageEl.innerHTML = storagePersistedResult
      ? '<span class="ok">許可されました（永続化あり）</span>'
      : '<span class="ng">許可されませんでした（ブラウザ依存）</span>';
  }
}

function renderStatus(status) {
  document.getElementById('diag-count').textContent =
    status.cachedCount + ' / ' + status.expectedCount + '（キャッシュ名: ' + status.cacheName + '）';

  const urlList = document.getElementById('diag-urls');
  urlList.innerHTML = '';
  if (status.cachedUrls && status.cachedUrls.length > 0) {
    status.cachedUrls.forEach((u) => {
      const li = document.createElement('li');
      li.textContent = u;
      urlList.appendChild(li);
    });
  } else {
    const li = document.createElement('li');
    li.textContent = '（キャッシュなし）';
    urlList.appendChild(li);
  }

  if (status.lastReport) {
    renderReport(status.lastReport);
  }
}

function renderReport(report) {
  const el = document.getElementById('diag-report');
  if (!report) {
    el.textContent = '記録なし';
    return;
  }
  const time = new Date(report.time).toLocaleString('ja-JP');
  let html = '取得日時: ' + time + '<br>';
  html += '成功: <span class="ok">' + report.succeeded.length + '</span> / 失敗: ' +
    (report.failed.length > 0 ? '<span class="ng">' + report.failed.length + '</span>' : '0');
  if (report.failed.length > 0) {
    html += '<ul>';
    report.failed.forEach((f) => {
      html += '<li><span class="ng">' + f.url + '</span><br>理由: ' + f.reason + '</li>';
    });
    html += '</ul>';
  }
  el.innerHTML = html;
}

function refreshDiagnostics() {
  renderStorageAndSw();
  const target = getMessageTarget();
  if (target) {
    target.postMessage({ type: 'GET_STATUS' });
  } else {
    document.getElementById('diag-count').textContent = '不明（SW未制御）';
  }
}

let cacheNowResponded = false;
document.getElementById('diag-refresh-btn').addEventListener('click', () => {
  const target = getMessageTarget();
  if (!target) {
    alert('Service Workerが制御していないため再取得できません。ページを再読み込みしてください。');
    return;
  }
  cacheNowResponded = false;
  target.postMessage({ type: 'CACHE_NOW' });

  setTimeout(() => {
    if (!cacheNowResponded) {
      alert('3秒以内に応答がありませんでした。古いService Workerが原因で更新できない可能性があります。ブラウザでアプリを完全に終了してから開き直してください。');
    }
  }, 3000);
});
</script>
</body>
</html>
